<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Highlights | Malik Owais</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#050505;color:#fff;font-family:'Space Grotesk',sans-serif}
a{text-decoration:none;color:#fff}
nav{position:fixed;top:0;left:0;width:100%;padding:2rem 4rem;display:flex;justify-content:space-between;align-items:center;background:rgba(5,5,5,.75);backdrop-filter:blur(12px);z-index:1000}
.logo{font-size:1.4rem;font-weight:600;letter-spacing:2px}
.nav-links{display:flex;gap:2rem}
.nav-links a{font-size:.85rem;letter-spacing:2px;text-transform:uppercase}
.hero{height:32vh;display:flex;align-items:flex-end;justify-content:center;padding-bottom:40px}
.hero h1{font-size:clamp(2.5rem,6vw,5rem);letter-spacing:6px;font-weight:500}
.grid{width:min(1400px,92%);margin:0 auto 80px;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:28px}
.card{position:relative;height:500px;border-radius:18px;overflow:hidden;background:#111;box-shadow:0 18px 40px rgba(0,0,0,.45);transition:.45s}
.card:hover{transform:translateY(-8px)}
.card img{width:100%;height:100%;object-fit:cover;transition:.6s}
.card:hover img{transform:scale(1.08)}
.overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.92),rgba(0,0,0,.15));display:flex;align-items:flex-end;padding:30px}
.overlay h2{font-size:1.5rem;letter-spacing:2px}
@media(max-width:768px){
nav{padding:1.5rem}.nav-links{gap:1rem}.nav-links a{font-size:.7rem}
.hero{height:24vh}.grid{width:92%}.card{height:320px}.overlay h2{font-size:1.15rem}
}
</style>
</head>
<body>
<nav>
<div class="logo">OM</div>
<div class="nav-links">
<a href="index.html">HOME</a>
<a href="index.html#work">WORK</a>
<a href="#">HIGHLIGHTS</a>
<a href="index.html#contact">CONTACT</a>
</div>
</nav>

<section class="hero"><h1>HIGHLIGHTS</h1></section>

<div class="grid">
<a class="card" href="travel.html">
<img src="travel.jpg" alt="Travel Film">
<div class="overlay"><h2>TRAVEL FILM</h2></div>
</a>

<a class="card" href="dji.html">
<img src="dji.jpg" alt="DJI Commercial">
<div class="overlay"><h2>DJI COMMERCIAL</h2></div>
</a>

<a class="card" href="arri.html">
<img src="arri.jpg" alt="ARRI Official Footage">
<div class="overlay"><h2>ARRI OFFICIAL FOOTAGE</h2></div>
</a>

<a class="card" href="blackmagic.html">
<img src="blackmagic.jpg" alt="Blackmagic Official Footage">
<div class="overlay"><h2>BLACKMAGIC OFFICIAL FOOTAGE</h2></div>
</a>


<a class="card" href="sony.html">
<img src="sony.jpg" alt="Sony Official Footage">
<div class="overlay"><h2>SONY OFFICIAL FOOTAGE</h2></div>
</a>

<a class="card" href="red.html">
<img src="red.jpg" alt="RED Official Footage">
<div class="overlay"><h2>RED OFFICIAL FOOTAGE</h2></div>
</a>
</div>
</body>
</html>
