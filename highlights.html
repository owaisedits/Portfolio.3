<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Highlights | Malik Owais</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:#050505;
font-family:'Space Grotesk',sans-serif;
overflow-x:hidden;
color:white;
}

a{
text-decoration:none;
color:white;
transition:.3s;
}

a:hover{
opacity:.7;
}

/* NAVIGATION */

nav{
position:fixed;
top:0;
left:0;
width:100%;
padding:2rem 4rem;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
background:rgba(5,5,5,.75);
backdrop-filter:blur(12px);
}

.logo{
font-size:1.4rem;
font-weight:600;
letter-spacing:2px;
}

.nav-links{
display:flex;
gap:2rem;
}

.nav-links a{
font-size:.85rem;
letter-spacing:2px;
text-transform:uppercase;
}

/* HERO */

.hero{
height:30vh;
display:flex;
justify-content:center;
align-items:flex-end;
padding-bottom:40px;
}

.hero h1{
font-size:clamp(2.5rem,6vw,5rem);
font-weight:500;
letter-spacing:6px;
}

/* HIGHLIGHTS */

.highlights-grid{
width:100%;
}

.highlight{
position:relative;
width:100%;
height:85vh;
overflow:hidden;
background:#000;
}

.highlight video{
width:100%;
height:100%;
object-fit:cover;
transition:1s ease;
}

.highlight:hover video{
transform:scale(1.04);
}

.highlight::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
to top,
rgba(0,0,0,.75),
rgba(0,0,0,.15)
);
pointer-events:none;
}

.highlight-title{
position:absolute;
bottom:40px;
left:40px;
font-size:1rem;
letter-spacing:4px;
font-weight:500;
z-index:2;
}

/* MOBILE */

@media(max-width:768px){

nav{
padding:1.5rem;
}

.nav-links{
gap:1rem;
}

.nav-links a{
font-size:.7rem;
}

.hero{
height:20vh;
}

.hero h1{
font-size:2rem;
}

.highlight{
height:55vh;
}

.highlight-title{
left:20px;
bottom:20px;
font-size:.8rem;
}

}

</style>
</head>

<body>

<nav>

<div class="logo">OM</div>

<div class="nav-links">
<a href="index.html">HOME</a>
<a href="index.html#work">WORK</a>
<a href="#">HIGHLIGHTS</a>
<a href="index.html#contact">CONTACT</a>
</div>

</nav>

<section class="hero">
<h1>HIGHLIGHTS</h1>
</section>

<div class="highlights-grid">

<div class="highlight">
<video autoplay muted loop playsinline preload="metadata">

</video>
